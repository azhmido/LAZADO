<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - LAZADO</title>
  <link rel="icon" href="../assets/shopping_cart_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png">
  <link rel="stylesheet" href="../css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
  <header>
    <h1><a href="../index.html">LAZADO🛒</a></h1>
    <nav>
      <button id="theme-toggle" title="Toggle theme">
        <span class="material-symbols-outlined sun-icon">light_mode</span>
        <span class="material-symbols-outlined moon-icon">dark_mode</span>
      </button>
    </nav>
  </header>

  <main>
    <div class="login-container">
      <form action="product.html" class="login-form">
        <h2>WELCOME</h2>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="login-button">Log In</button>
        <div class="form-footer">
          <p>Don't have an account? <a href="regis.html">Registration</a></p>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 LAZADO</p>
  </footer>

  <script src="../javascript/script.js"></script>
</body>
</html>

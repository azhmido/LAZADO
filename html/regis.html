<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration - LAZADO</title>
  <link rel="icon" href="../assets/shopping_cart_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png">
  <link rel="stylesheet" href="../css/regis.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
  <header>
    <h1><a href="../index.html">LAZADO🛒</a></h1>
     <nav>
      <button id="theme-toggle" title="Toggle theme">
        <span class="material-symbols-outlined sun-icon">light_mode</span>
        <span class="material-symbols-outlined moon-icon">dark_mode</span>
      </button>
    </nav>
  </header>

  <main>
    <div class="signup-container">
      <form action="login.html" class="signup-form">
        <h2>Create an Account</h2>
        <div class="input-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name" required />
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>
         <div class="input-group">
          <label for="fullname">Usernama</label>
          <input type="text" id="username" placeholder="Enter your full name" required />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" required />
        </div>
        <button type="submit" class="signup-button">Registration</button>
        <div class="form-footer">
          <p>Already have an account? <a href="login.html">Log In</a></p>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 LAZADO</p>
  </footer>

  <script src="../javascript/script.js"></script>
</body>
</html>
